<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/mylogo.jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnbuDevs</title>
  <meta name="description"
    content="AnbuDevs — Your all-in-one placement and developer skills hub. Practice coding, aptitude, English, and explore 10 trending career roadmaps." />
  <meta name="author" content="AnbuDevs" />

  <meta property="og:title" content="AnbuDevs — Developer Skills & Placement Hub" />
  <meta property="og:description"
    content="Master coding, aptitude, communication, and explore career roadmaps for 2026. Built for aspiring developers." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@AnbuDevs" />
  <style>
    /* CSS for the loading animation */
    #root:empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      background-color: #050510;
      /* Deep dark background */
    }

    #loading-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #050510;
      /* Deep dark background */
      z-index: 9999;
      transition: opacity 0.8s ease-in-out, filter 0.8s ease-in-out;
    }

    .loader-brand {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 150px;
      height: 150px;
      animation: fade-in 1.5s ease-out forwards;
      opacity: 0;
    }

    .loader-brand img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      z-index: 10;
      background-color: #000;
      animation: center-pulse 3s ease-in-out infinite alternate;
    }

    /* Outer tech ring */
    .tech-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px dashed rgba(0, 240, 255, 0.2);
      border-top: 2px solid #00f0ff;
      /* Neon cyan */
      border-right: 2px solid #8a2be2;
      /* Neon purple */
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.3), inset 0 0 10px rgba(138, 43, 226, 0.2);
      animation: spin-clockwise 4s linear infinite;
    }

    /* Inner digital progress glow */
    .progress-glow {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-left-color: #00f0ff;
      border-bottom-color: #8a2be2;
      filter: drop-shadow(0 0 10px #00f0ff);
      animation: spin-counter 3s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    /* Digital Particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background-color: #00f0ff;
      border-radius: 50%;
      box-shadow: 0 0 8px 2px #00f0ff;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
    }

    .particle-2 {
      background-color: #8a2be2;
      box-shadow: 0 0 8px 2px #8a2be2;
      top: auto;
      bottom: -2px;
      left: 50%;
      animation: none;
      /* Inherits the counter rotation of parent */
    }

    .loading-text {
      margin-top: 3rem;
      color: rgba(0, 240, 255, 0.8);
      font-family: 'JetBrains Mono', 'Inter', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
      animation: fade-in 2s ease-out forwards;
      opacity: 0;
      animation-delay: 0.5s;
    }

    .loading-text span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background-color: #8a2be2;
      border-radius: 50%;
      box-shadow: 0 0 10px #8a2be2;
      animation: neon-pulse 1.5s infinite;
    }

    .loading-text span:nth-child(1) {
      animation-delay: 0s;
    }

    .loading-text span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-text span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin-clockwise {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-counter {
      0% {
        transform: rotate(360deg);
      }

      100% {
        transform: rotate(0deg);
      }
    }

    @keyframes center-pulse {
      0% {
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.8);
      }

      50% {
        box-shadow: 0 0 30px rgba(138, 43, 226, 0.6), inset 0 0 10px rgba(0, 0, 0, 0.5);
      }

      100% {
        box-shadow: 0 0 15px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.8);
      }
    }

    @keyframes neon-pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.5);
        opacity: 1;
        background-color: #00f0ff;
        box-shadow: 0 0 15px #00f0ff;
      }
    }

    /* Exit animation */
    .splash-exit {
      opacity: 0 !important;
      filter: blur(15px);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="loading-splash">
    <div class="loader-brand">
      <div class="tech-ring">
        <div class="particle"></div>
      </div>
      <div class="progress-glow">
        <div class="particle particle-2"></div>
      </div>
      <img src="/mylogo.jpeg" alt="AnbuDevs Logo" />
    </div>
    <div class="loading-text">
      SYSTEM.BOOT
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove loading splash after a guaranteed minimum time (6 seconds)
    // combined with React rendering into #root.
    let reactReady = false;
    let minTimeElapsed = false;

    // Wait at least 6 seconds before dismissing the splash
    setTimeout(() => {
      minTimeElapsed = true;
      if (reactReady) {
        dismissSplash();
      }
    }, 6500); // 6.5s guaranteed loader duration

    function dismissSplash() {
      const splash = document.getElementById('loading-splash');
      if (splash) {
        // Apply the exit class
        splash.classList.add('splash-exit');
        setTimeout(() => splash.remove(), 800); // Wait for transition
      }
    }

    const observer = new MutationObserver((mutationsList, observer) => {
      for (let mutation of mutationsList) {
        if (mutation.type === 'childList') {
          reactReady = true;
          if (minTimeElapsed) {
            dismissSplash();
          }
          observer.disconnect();
          break;
        }
      }
    });

    // Start observing the root node for configured mutations
    const rootNode = document.getElementById('root');
    if (rootNode) {
      observer.observe(rootNode, { childList: true });
    }
  </script>
</body>

</html>
